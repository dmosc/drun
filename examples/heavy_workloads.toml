# drun configuration — heavy / long-running workloads
#
# Use this for compute-intensive or I/O-heavy tasks: processing multi-GB
# datasets, running long simulations, or any workflow where individual
# session_bash calls routinely take several minutes.
#
# Key differences from the default config:
#   - bash_timeout_ms raised to 10 minutes
#   - Workspace is expanded to 4 GB
#   - Sessions are capped at 2 to avoid resource contention
#   - Fewer checkpoints stored (heavy tasks rarely need deep rollback history)
#   - Snapshots are written on close so long sessions can be resumed
#
# Usage (Python SDK):
#   DRUN_CONFIG=examples/heavy_workloads.toml \
#       python your_heavy_script.py
#
# Usage (MCP):
#   { "env": { "DRUN_CONFIG": "/absolute/path/to/examples/heavy_workloads.toml" } }

# 10 minutes per session_bash call — covers multi-GB archive extraction and
# extended numerical simulations.
bash_timeout_ms = 600_000

# 4 GB workspace — enough for most datasets and intermediate artifacts
# without spilling to disk-based storage.
max_workspace_mb = 4096

# Limit parallelism to avoid out-of-memory conditions under heavy load.
max_sessions = 2

# Deep rollback history wastes memory on large workspaces; keep fewer checkpoints.
max_checkpoints = 25

# Heavy sessions are long-lived; don't time them out prematurely.
session_idle_timeout_secs = 14_400

# Always snapshot on close — long sessions are expensive to redo from scratch.
snapshot_on_close = true
snapshots_dir = "/tmp/drun-snapshots"

# Export large outputs here.
export_root = "/tmp/drun-outputs"
