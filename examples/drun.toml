# drun configuration for stock financial analysis
# Produces PDF reports from live market data and SEC filings.
#
# Usage:
#   DRUN_CONFIG=/path/to/drun.toml drun-mcp

# Domains the agent may reach via session_fetch.
domain_allowlist = [
    "query1.finance.yahoo.com",
    "query2.finance.yahoo.com",
    "data.sec.gov",
    "efts.sec.gov",
    "www.sec.gov",
]
# No overall timeout; financial API payloads (e.g. full 10-K XBRL) can be large.
# Uncomment to add a hard ceiling if needed:
# fetch_timeout_ms = 120000

# Raw price history + charts + the generated PDF comfortably fit under 200 MB.
max_workspace_mb = 200

# Safety harnesses — prevent runaway memory and abandoned sessions.
# max_sessions = 20
# max_checkpoints = 100
# session_idle_timeout_secs = 3600

# Restrict session_mount to a single input directory so the agent can only
# read files you explicitly place there (e.g. a watchlist CSV).
# Adjust or remove if you do not use session_mount.
mount_allowlist = ["/tmp/drun-inputs"]

# All session_export calls must write under this directory.
# The agent cannot scatter files across the host filesystem.
export_root = "/tmp/drun-reports"

# Directory where session_snapshot writes .drun files.
# Unset means snapshots default to ./drun-snapshots/<session_id>.drun.
# snapshots_dir = "/tmp/drun-snapshots"

# Automatically write a .drun snapshot whenever session_close is called.
# Snapshots land in snapshots_dir (or ./drun-snapshots if unset).
# snapshot_on_close = true

# Host environment variables the agent may read via session_get_env.
# Empty (default) means none are accessible.
# env_allowlist = ["OPENAI_API_KEY", "ANTHROPIC_API_KEY"]

# Directory where pip packages are installed and cached across sessions.
# Defaults to a drun-packages subdirectory in the OS temp dir.
# packages_dir = "/var/lib/drun/packages"

# PyPI packages the agent is permitted to install via session_install_package.
# Empty (default) means all packages are allowed.
# package_allowlist = ["pandas", "numpy", "matplotlib", "pdfplumber", "yfinance"]

# Controls how long a single command may run (default 30 s).
# bash_timeout_ms = 30000

# Substrings that, if present in the command, cause immediate rejection.
# bash_command_denylist = ["rm -rf /", "curl", "wget"]

# If non-empty, the command must contain at least one listed substring to be
# permitted.
# bash_command_allowlist = ["git", "npm", "make"]
