# drun configuration — data science (pure Python, no third-party packages)
#
# session_bash has no network access and no package-install mechanism, so
# this recipe assumes datasets are fetched on the host (via session_fetch
# over MCP, or directly in the example script for the Python SDK path) and
# analysis is done with the Python standard library only.
#
# Usage (Python SDK):
#   DRUN_CONFIG=examples/data_science.toml \
#       python examples/data_science.py
#
# Usage (MCP):
#   { "env": { "DRUN_CONFIG": "/absolute/path/to/examples/data_science.toml" } }

# Public dataset repositories session_fetch may reach (MCP path only).
domain_allowlist = [
    "raw.githubusercontent.com",
    "archive.ics.uci.edu",
]

# Datasets and intermediate artifacts can be a few hundred MB.
max_workspace_mb = 1024

# Training a pure-Python classifier on a small dataset is fast, but allow
# headroom for larger datasets or slower hosts.
bash_timeout_ms = 60_000

# Data science sessions may run for hours; don't abandon them too quickly.
session_idle_timeout_secs = 14_400

max_sessions = 4

bash_command_denylist = ["rm -rf", "curl", "wget"]

# Results export here.
export_root = "/tmp/drun-data-science"

# Snapshots are off for exploratory work — turn on if sessions are long-running
# and you want to be able to resume them.
snapshot_on_close = false
