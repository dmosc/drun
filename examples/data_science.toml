# drun configuration — data science and machine learning
#
# Use this when the agent needs to fetch datasets from the web, train models,
# generate charts, and export results. Workspace and timeouts are sized up
# relative to defaults because datasets and model training are larger and slower.
#
# The built-in PyPI domains are always available — no need to list them here.
#
# Usage (Python SDK):
#   DRUN_CONFIG=examples/data_science.toml \
#       python examples/data_science.py
#
# Usage (MCP):
#   { "env": { "DRUN_CONFIG": "/absolute/path/to/examples/data_science.toml" } }

# Public dataset repositories the agent may fetch from.
domain_allowlist = [
    "raw.githubusercontent.com",
    "archive.ics.uci.edu",
    "datasets.huggingface.co",
]

# Datasets and model artifacts can be several hundred MB.
max_workspace_mb = 1024

# Model training can involve heavy compute — allow up to 3 minutes per execution.
exec_timeout_ms = 180_000

# scikit-learn and matplotlib pull in numpy/scipy; allow 5 min on a cold cache.
install_timeout_ms = 300_000

# Bash commands also need more time for file operations on large datasets.
bash_timeout_ms = 60_000

# Data science sessions may run for hours; don't abandon them too quickly.
session_idle_timeout_secs = 14_400

max_sessions = 4

# Packages the agent may install.
package_allowlist = [
    "pandas",
    "numpy",
    "matplotlib",
    "scikit-learn",
    "seaborn",
    "tabulate",
    "requests",
]

bash_command_denylist = ["rm -rf", "curl", "wget"]

# Results and generated plots export here.
export_root = "/tmp/drun-data-science"

# Snapshots are off for exploratory work — turn on if sessions are long-running
# and you want to be able to resume them.
snapshot_on_close = false
