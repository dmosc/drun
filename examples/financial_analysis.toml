# drun configuration — financial analysis
#
# Use this when an agent needs to analyze financial data and export
# Markdown reports. Data fetching happens on the host (via session_fetch
# over MCP, or directly in the example script for the Python SDK path) —
# session_bash itself has no network access at all, on either platform.
#
# Usage (Python SDK):
#   DRUN_CONFIG=examples/financial_analysis.toml \
#       python examples/financial_analysis.py
#
# Usage (MCP — set in ~/.claude/settings.json or .claude/settings.json):
#   { "env": { "DRUN_CONFIG": "/absolute/path/to/examples/financial_analysis.toml" } }
#   Then reload the window and ask Claude to analyze a company's financials
#   using session_fetch.

# Financial data sources session_fetch may reach (MCP path only).
domain_allowlist = [
    "data.sec.gov",
    "efts.sec.gov",
    "www.sec.gov",
    "query1.finance.yahoo.com",
    "query2.finance.yahoo.com",
]

# Raw XBRL payloads and generated reports fit comfortably here.
max_workspace_mb = 512

# One base session plus room for parallel company comparisons.
max_sessions = 4

# SEC EDGAR full 10-K XBRL payloads can be large and slow to parse — allow 3 min.
bash_timeout_ms = 180_000

# Keep sessions alive across breaks in the analysis.
session_idle_timeout_secs = 7200

# Reject dangerous shell commands before they reach the sandbox.
bash_command_denylist = ["rm -rf", "curl", "wget", "nc"]

# Preserve session state — financial analysis sessions are worth keeping.
snapshot_on_close = true
snapshots_dir = "/tmp/drun-snapshots"

# All exported files (reports, charts) land here.
export_root = "/tmp/drun-financial"
