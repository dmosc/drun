name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: drun-mcp-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: drun-mcp-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: drun-mcp-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release -p drun-mcp --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/drun-mcp ${{ matrix.asset }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
