<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>drun · trajectory viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0d13;
      --s1:          #11141d;
      --s2:          #181c28;
      --s3:          #1e2234;
      --border:      #222638;
      --border-hi:   #333a5a;
      --text:        #c6cae6;
      --text-dim:    #7a82aa;
      --text-muted:  #444c6e;
      --accent:      #7c6af5;
      --accent-bg:   #1a1740;
      --green:       #4fd98a;
      --green-bg:    #0b2218;
      --amber:       #f0982e;
      --amber-bg:    #261708;
      --red:         #e0556a;
      --red-bg:      #25090f;
      --mono:        'SF Mono', 'Cascadia Mono', 'Fira Code', Consolas, monospace;
      --radius:      7px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13.5px;
      line-height: 1.45;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    #page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-logo { display: flex; align-items: baseline; gap: 8px; }
    .logo-mark { color: var(--accent); font-size: 16px; }
    .logo-name { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-tagline { font-size: 11.5px; color: var(--text-muted); }

    .header-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11.5px;
      color: var(--text-dim);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }

    .live-dot.offline { background: var(--text-muted); box-shadow: none; }

    /* ── Status strip ──────────────────────────────────────────────────── */
    #status-strip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 16px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .stat-item { white-space: nowrap; }
    .stat-sep { color: var(--text-muted); }
    .stat-warn   { color: var(--amber); }
    .stat-danger { color: var(--red); }

    #daemon-toggle {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 4px;
    }

    #daemon-toggle:hover { color: var(--text-dim); }

    #daemon-panel {
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px 10px;
    }

    #daemon-panel.hidden { display: none; }

    .daemon-row {
      display: flex;
      gap: 10px;
      padding: 2px 0;
      font-size: 11.5px;
      line-height: 1.5;
    }

    .daemon-row-label {
      flex-shrink: 0;
      width: 80px;
      color: var(--text-muted);
    }

    .daemon-row-value {
      font-family: var(--mono);
      color: var(--text-dim);
      word-break: break-word;
    }

    /* ── Page body ─────────────────────────────────────────────────────── */
    #page-body {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    section { margin-top: 16px; }
    section.hidden { display: none !important; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .mono-id { font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); }

    .label-badge {
      font-size: 11.5px;
      padding: 1px 7px;
      border-radius: 4px;
      background: var(--accent-bg);
      color: var(--accent);
    }

    /* ── Session cards ─────────────────────────────────────────────────── */
    #sessions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }

    .empty-state {
      color: var(--text-muted);
      font-size: 12.5px;
      padding: 24px 0;
      text-align: center;
      grid-column: 1 / -1;
    }

    .session-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.12s, background 0.12s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .session-card.active { border-color: var(--accent); }

    .session-card-main {
      padding: 9px 11px;
      cursor: pointer;
      user-select: none;
      flex: 1;
    }

    .session-card-main:hover { background: var(--s2); }
    .session-card.active .session-card-main { background: var(--accent-bg); }

    .card-session-id {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .card-session-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card-session-label.unlabeled { font-weight: 400; color: var(--text-muted); }

    .card-badges { display: flex; flex-wrap: wrap; gap: 4px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10.5px;
      font-family: var(--mono);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .badge-neutral { background: var(--s3); color: var(--text-dim); border: 1px solid var(--border); }
    .badge-fork    { background: var(--s3); color: var(--text-muted); border: 1px solid var(--border); font-size: 10px; }
    .badge-warn    { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(240, 152, 46, 0.3); }
    .badge-danger  { background: var(--red-bg); color: var(--red); border: 1px solid rgba(224, 85, 106, 0.35); }
    .badge-live    { background: var(--green-bg); color: var(--green); border: 1px solid rgba(79, 217, 138, 0.35); }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    .live-indicator-dot { display: inline-block; animation: livePulse 1.4s ease-in-out infinite; }

    .card-actions-row {
      display: flex;
      border-top: 1px solid var(--border);
    }

    .card-action {
      flex: 1;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      padding: 6px 2px;
      cursor: pointer;
      transition: color 0.12s, background 0.12s;
    }

    .card-action:last-child { border-right: none; }
    .card-action:hover { color: var(--text); background: var(--s2); }
    .card-action-danger:hover { color: var(--red); background: var(--red-bg); }

    /* ── Context bar ───────────────────────────────────────────────────── */
    .context-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 11px;
      margin-bottom: 10px;
    }

    .context-command {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      overflow-x: auto;
      white-space: pre;
      flex: 1 1 200px;
      min-width: 0;
    }

    .context-command::before { content: '$ '; color: var(--accent); font-weight: 700; }

    .context-actions { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }

    .btn {
      background: none;
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 9px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      white-space: nowrap;
    }

    .btn:hover { color: var(--text); border-color: var(--accent); }
    .btn-link { border: none; padding: 2px 4px; }

    /* ── Live bar ──────────────────────────────────────────────────────── */
    .live-bar {
      background: var(--s1);
      border: 1px solid rgba(79, 217, 138, 0.3);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .live-bar.hidden { display: none; }

    .live-bar-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 11px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11.5px;
    }

    .live-bar-command { flex: 1; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Columns ───────────────────────────────────────────────────────── */
    .columns-grid {
      display: grid;
      grid-template-columns: 190px minmax(220px, 1fr) minmax(260px, 1.3fr);
      gap: 10px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .columns-grid { grid-template-columns: 1fr; }
    }

    .column {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .column-head-hint { font-size: 10.5px; font-weight: 400; font-family: var(--mono); color: var(--text-muted); }

    .column-body { overflow-y: auto; }

    #checkpoints-list { max-height: 480px; }
    #output-body { max-height: 480px; padding: 10px; }
    #files-tree { max-height: 170px; border-bottom: 1px solid var(--border); }
    #files-preview { max-height: 300px; overflow-y: auto; }

    .empty-column-note {
      padding: 12px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Checkpoint list ───────────────────────────────────────────────── */
    .cp-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      cursor: pointer;
      border-left: 2px solid transparent;
      font-family: var(--mono);
      font-size: 11.5px;
    }

    .cp-row:hover { background: var(--s2); }
    .cp-row.selected { background: var(--accent-bg); border-left-color: var(--accent); }
    .cp-row.is-head:not(.selected) { border-left-color: rgba(79, 217, 138, 0.4); }
    .cp-row.selected.is-head { background: var(--green-bg); border-left-color: var(--green); }

    .cp-row-num { color: var(--text-dim); flex-shrink: 0; }

    .cp-row-label {
      color: var(--accent);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cp-row-delta { flex-shrink: 0; font-size: 10px; display: flex; gap: 4px; }

    /* ── Output column ─────────────────────────────────────────────────── */
    .output-label {
      font-size: 10.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .output-label:not(:first-child) { margin-top: 12px; }

    .output-pre {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .output-empty { font-size: 12px; color: var(--text-muted); }
    .loading-note { padding: 10px; font-size: 12px; color: var(--text-muted); }

    /* ── Files column ──────────────────────────────────────────────────── */
    .file-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11.5px;
      cursor: default;
    }

    .file-row.tree-file { cursor: pointer; }
    .file-row.tree-file:hover { background: var(--s2); }
    .file-row.tree-file.active { background: var(--accent-bg); }
    .file-row.tree-file.active .file-path { color: var(--accent); }

    .file-sigil { width: 10px; font-weight: 700; flex-shrink: 0; text-align: center; }
    .sigil-a { color: var(--green); }
    .sigil-m { color: var(--amber); }
    .sigil-r { color: var(--red); }

    .file-path { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .file-size { color: var(--text-muted); font-size: 10px; flex-shrink: 0; }

    .tree-dir { margin: 0; }

    .tree-dir-label {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--text-dim);
      cursor: pointer;
      list-style: none;
    }

    .tree-dir-label::-webkit-details-marker { display: none; }
    .tree-dir-label::before { content: '▸'; color: var(--text-muted); font-size: 9px; width: 8px; }
    .tree-dir[open] > .tree-dir-label::before { content: '▾'; }
    .tree-dir-body { padding-left: 12px; }
    .tree-removed { border-top: 1px solid var(--border); margin-top: 2px; padding-top: 2px; }

    .file-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .file-preview-body { padding: 10px; }
    .file-preview-image { max-width: 100%; border-radius: 4px; display: block; }

    .file-preview-diff-label {
      padding: 8px 10px 0;
      font-size: 10.5px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    .diff-block { overflow-x: auto; }
    .diff-line { display: block; font-family: var(--mono); font-size: 11.5px; line-height: 1.55; white-space: pre; }
    .diff-line.added   { color: var(--green); background: var(--green-bg); }
    .diff-line.removed { color: var(--red);   background: var(--red-bg);   }
    .diff-line.meta    { color: var(--text-muted); }
    .diff-line.hunk    { color: var(--accent); }
    .diff-line.context { color: var(--text-muted); }
  </style>
</head>
<body>
  <header id="page-header">
    <div class="header-logo">
      <span class="logo-mark">◆</span>
      <span class="logo-name">drun</span>
      <span class="logo-tagline">Trajectory viewer</span>
    </div>
    <div class="header-status">
      <span class="live-dot" id="live-dot"></span>
      <span id="status-label">Connecting…</span>
    </div>
  </header>

  <div id="status-strip"></div>

  <div id="daemon-panel" class="hidden"></div>

  <div id="page-body">
    <section id="sessions-section">
      <div class="section-label">Sessions</div>
      <div id="sessions-grid"></div>
    </section>

    <section id="workspace-section" class="hidden">
      <div class="context-bar" id="context-bar"></div>

      <div class="live-bar hidden" id="live-bar">
        <div class="live-bar-head">
          <span class="badge badge-live"><span class="live-indicator-dot">●</span>&nbsp;Running</span>
          <span class="live-bar-command" id="live-command"></span>
        </div>
        <div class="column-body" id="live-output-body" style="max-height:160px; padding:10px">
          <pre class="output-pre" id="live-output-pre"></pre>
        </div>
      </div>

      <div class="columns-grid">
        <div class="column" id="checkpoints-column">
          <div class="column-head">Checkpoints</div>
          <div class="column-body" id="checkpoints-list"></div>
        </div>

        <div class="column" id="output-column">
          <div class="column-head">Output</div>
          <div class="column-body" id="output-body"></div>
        </div>

        <div class="column" id="files-column">
          <div class="column-head">
            Files
            <span class="column-head-hint" id="files-counts"></span>
          </div>
          <div class="column-body" id="files-tree"></div>
          <div class="column-body" id="files-preview"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────

    const viewState = {
      sessionTree:        [],
      flatSessions:       [],
      selectedSessionId:  null,
      checkpointHistory:  [],
      selectedCpId:       null,
      selectedFilePath:   null,
      // `${sessionId}:${cpId}` → { stdout, stderr, diff, fileNames, files }
      outputCache:        new Map(),
      // `${sessionId}:${cpId}:${path}` → { kind: 'text'|'image'|'binary', content?, url? }
      fileCache:          new Map(),
      daemonStatus:       null,
      daemonPanelOpen:    false,
      liveOutput:         null,   // { running, command, output } for the selected session
    };

    // ── Helpers ──────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function shortId(sessionId) {
      return sessionId.length > 14 ? sessionId.slice(0, 14) + '…' : sessionId;
    }

    function fmtBytes(n) {
      if (n === 0) return '0 B';
      if (n < 1024) return `${n} B`;
      if (n < 1048576) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1048576).toFixed(1)} MB`;
    }

    function fmtDuration(secs) {
      if (secs < 60) return `${secs}s`;
      const mins = Math.floor(secs / 60);
      if (mins < 60) return `${mins}m`;
      const hours = Math.floor(mins / 60);
      const remMins = mins % 60;
      return remMins ? `${hours}h ${remMins}m` : `${hours}h`;
    }

    function flattenTree(tree) {
      const result = [];
      function walk(node) {
        result.push(node);
        for (const checkpoint of node.checkpoints)
          for (const fork of (checkpoint.forks || []))
            walk(fork);
      }
      for (const root of tree) walk(root);
      return result;
    }

    function findSession(sessionId) {
      return viewState.flatSessions.find(s => s.session_id === sessionId) || null;
    }

    function currentCpIdForSession(session) {
      const head = session.checkpoints.find(c => c.is_current);
      return head ? head.checkpoint_id : null;
    }

    function extractFileNamesFromDiff(diffText) {
      const added = [], modified = [], removed = [];
      const lines = diffText.split('\n');
      for (let i = 0; i < lines.length - 1; i++) {
        const line = lines[i];
        if (!line.startsWith('--- ')) continue;
        const nextLine = lines[i + 1];
        if (!nextLine.startsWith('+++ ')) continue;
        const fromPath = line.slice(4).replace(/^a\//, '');
        const toPath   = nextLine.slice(4).replace(/^b\//, '');
        if (fromPath === '/dev/null') {
          added.push(toPath);
        } else if (toPath === '/dev/null') {
          removed.push(fromPath);
        } else {
          modified.push(fromPath);
        }
        i++;
      }
      return { added, modified, removed };
    }

    // Slices a single file's hunks out of a whole-checkpoint unified diff —
    // the server only exposes a checkpoint-wide diff, so file-scoped diffs
    // are derived client-side instead of adding a new endpoint for it.
    function extractFileDiff(diffText, path) {
      if (!diffText) return '';
      const lines = diffText.split('\n');
      for (let i = 0; i < lines.length - 1; i++) {
        if (!lines[i].startsWith('--- ')) continue;
        const nextLine = lines[i + 1];
        if (!nextLine.startsWith('+++ ')) continue;
        const fromPath = lines[i].slice(4).replace(/^a\//, '');
        const toPath   = nextLine.slice(4).replace(/^b\//, '');
        if (fromPath !== path && toPath !== path) continue;
        let end = lines.length;
        for (let j = i + 2; j < lines.length; j++) {
          if (lines[j].startsWith('--- ')) { end = j; break; }
        }
        return lines.slice(i, end).join('\n').replace(/\n+$/, '');
      }
      return '';
    }

    // ── API ──────────────────────────────────────────────────────────────────
    // Every server endpoint the UI talks to is called through here — no other
    // function builds a `/api/...` URL by hand.

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${res.status} ${url}`);
      return res.json();
    }

    async function fetchText(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${res.status} ${url}`);
      return res.text();
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: body === undefined ? undefined : { 'Content-Type': 'application/json' },
        body: body === undefined ? undefined : JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
      return res.json();
    }

    const Api = {
      status:            () => fetchJson('/api/status'),
      sessionsTree:       () => fetchJson('/api/sessions/tree'),
      liveOutput:        sessionId => fetchJson(`/api/sessions/${sessionId}/live`),
      checkpointHistory: sessionId => fetchJson(`/api/sessions/${sessionId}/history`),
      checkpointFiles:   (sessionId, cpId) => fetchJson(`/api/sessions/${sessionId}/checkpoints/${cpId}/files`),
      stdout:            (sessionId, cpId) => fetchText(`/api/sessions/${sessionId}/checkpoints/${cpId}/stdout`),
      stderr:            (sessionId, cpId) => fetchText(`/api/sessions/${sessionId}/checkpoints/${cpId}/stderr`),
      diff:              (sessionId, fromId, toId) => fetchText(`/api/sessions/${sessionId}/diff?from=${fromId}&to=${toId}`),
      fork:              (sessionId, checkpointId) => postJson(`/api/sessions/${sessionId}/fork`, { checkpoint_id: checkpointId }),
      rollback:          (sessionId, checkpointId) => postJson(`/api/sessions/${sessionId}/rollback`, { checkpoint_id: checkpointId }),
      setLabel:          (sessionId, label) => postJson(`/api/sessions/${sessionId}/label`, { label }),
      snapshot:          sessionId => postJson(`/api/sessions/${sessionId}/snapshot`, undefined),

      async fileContent(sessionId, cpId, path) {
        const url = `/api/sessions/${sessionId}/checkpoints/${cpId}/files/${path.split('/').map(encodeURIComponent).join('/')}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`${res.status} ${url}`);
        const contentType = res.headers.get('content-type') || '';
        if (contentType.startsWith('image/')) return { kind: 'image', url };
        if (res.headers.get('x-drun-binary') === 'true') return { kind: 'binary' };
        return { kind: 'text', content: await res.text() };
      },

      async deleteSession(sessionId) {
        const res = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
        if (!res.ok && res.status !== 404) throw new Error(`${res.status} deleting ${sessionId}`);
      },
    };

    // ── Clipboard ────────────────────────────────────────────────────────────

    async function copyToClipboard(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      }
      flashButton(btn);
    }

    function flashButton(btn) {
      if (!btn) return;
      const original = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(() => { btn.textContent = original; }, 1000);
    }

    // ── Rendering: daemon status ─────────────────────────────────────────────

    function renderStatusStrip() {
      const status = viewState.daemonStatus;
      const strip  = document.getElementById('status-strip');
      if (!status) { strip.innerHTML = ''; return; }

      const capacity = status.max_sessions
        ? `${status.session_count}/${status.max_sessions} sessions`
        : `${status.session_count} sessions`;
      const capacityClass = status.max_sessions && status.session_count / status.max_sessions >= 0.9
        ? 'stat-danger' : status.max_sessions && status.session_count / status.max_sessions >= 0.7
        ? 'stat-warn' : '';

      const items = [
        `v${escHtml(status.version)}`,
        `pid ${status.pid}`,
        `up ${fmtDuration(status.uptime_secs)}`,
        `<span class="${capacityClass}">${capacity}</span>`,
      ];
      if (status.memory_rss_bytes != null) items.push(fmtBytes(status.memory_rss_bytes));

      strip.innerHTML = items
        .map(item => `<span class="stat-item">${item}</span>`)
        .join('<span class="stat-sep">·</span>')
        + `<button id="daemon-toggle">${viewState.daemonPanelOpen ? '▾' : '▸'} Daemon</button>`;
    }

    function renderDaemonPanel() {
      const panel  = document.getElementById('daemon-panel');
      const status = viewState.daemonStatus;
      panel.classList.toggle('hidden', !viewState.daemonPanelOpen || !status);
      if (!viewState.daemonPanelOpen || !status) return;

      const idleTimeout = status.session_idle_timeout_secs != null
        ? `${fmtDuration(status.session_idle_timeout_secs)} idle timeout` : 'No idle timeout';
      const workspace = status.max_workspace_mb != null
        ? `${status.max_workspace_mb} MB workspace cap` : 'No workspace cap';
      const checkpoints = status.max_checkpoints != null
        ? `${status.max_checkpoints} checkpoints per session` : 'No checkpoint cap';

      const rows = [
        ['Ports',   `MCP :${status.mcp_port} · Web :${status.web_port}`],
        ['Limits',  `${idleTimeout} · ${workspace} · ${checkpoints}`],
        ['Domains', status.domain_allowlist.length ? escHtml(status.domain_allowlist.join(', ')) : 'None allowed'],
        ['Mounts',  status.mount_allowlist.length ? escHtml(status.mount_allowlist.join(', ')) : 'All host paths allowed'],
      ];

      panel.innerHTML = rows.map(([label, value]) => `
        <div class="daemon-row">
          <span class="daemon-row-label">${label}</span>
          <span class="daemon-row-value">${value}</span>
        </div>`).join('');
    }

    document.addEventListener('click', e => {
      if (e.target.id !== 'daemon-toggle') return;
      viewState.daemonPanelOpen = !viewState.daemonPanelOpen;
      renderStatusStrip();
      renderDaemonPanel();
    });

    // ── Rendering: sessions ──────────────────────────────────────────────────

    function sessionIdleBadge(session) {
      const idleTimeout = viewState.daemonStatus?.session_idle_timeout_secs;
      const idleAgo = `Idle ${fmtDuration(session.idle_secs)}`;
      if (idleTimeout == null) {
        return `<span class="badge badge-neutral">${idleAgo}</span>`;
      }
      const frac = session.idle_secs / idleTimeout;
      if (frac < 0.5) {
        return `<span class="badge badge-neutral">${idleAgo}</span>`;
      }
      const remaining = Math.max(idleTimeout - session.idle_secs, 0);
      const cls  = frac >= 0.9 ? 'badge-danger' : 'badge-warn';
      const text = frac >= 1 ? `${idleAgo} · reaping soon` : `${idleAgo} · reaps in ${fmtDuration(remaining)}`;
      return `<span class="badge ${cls}">${text}</span>`;
    }

    function renderSessionGrid() {
      const grid = document.getElementById('sessions-grid');
      const sessions = viewState.flatSessions;

      if (sessions.length === 0) {
        grid.innerHTML = '<div class="empty-state">No active sessions — start an agent to see trajectory data here.</div>';
        return;
      }

      grid.innerHTML = sessions.map(s => {
        const isActive = s.session_id === viewState.selectedSessionId;
        const headCpId = currentCpIdForSession(s);
        const totalCps = s.checkpoints.length;
        const isForked = !!s.parent_session_id;

        return `
          <div class="session-card ${isActive ? 'active' : ''}">
            <div class="session-card-main" onclick="onSessionClick('${escHtml(s.session_id)}')" title="Created ${fmtDuration(s.age_secs)} ago">
              <div class="card-session-id" title="${escHtml(s.session_id)}">${escHtml(shortId(s.session_id))}</div>
              <div class="card-session-label ${s.label ? '' : 'unlabeled'}">${s.label ? escHtml(s.label) : 'Unlabeled'}</div>
              <div class="card-badges">
                <span class="badge badge-neutral">Checkpoint ${headCpId ?? '—'} / ${totalCps - 1}</span>
                ${s.running ? '<span class="badge badge-live"><span class="live-indicator-dot">●</span>&nbsp;Running</span>' : sessionIdleBadge(s)}
                ${isForked ? `<span class="badge badge-fork" title="Forked from ${escHtml(s.parent_session_id)} at checkpoint ${s.parent_checkpoint_id}">⑂ ${escHtml(shortId(s.parent_session_id))}</span>` : ''}
              </div>
            </div>
            <div class="card-actions-row">
              <button class="card-action" onclick="copyToClipboard('${escHtml(s.session_id)}', this)">Copy</button>
              <button class="card-action" onclick="onEditLabelClick('${escHtml(s.session_id)}')">Label</button>
              <button class="card-action" onclick="onSnapshotClick('${escHtml(s.session_id)}', this)">Snapshot</button>
              <button class="card-action card-action-danger" onclick="onDestroySessionClick('${escHtml(s.session_id)}')">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    // ── Rendering: checkpoint list ────────────────────────────────────────────

    function renderCheckpointList() {
      const session = findSession(viewState.selectedSessionId);
      if (!session) return;

      const list = document.getElementById('checkpoints-list');
      const byId = new Map(viewState.checkpointHistory.map(h => [h.checkpoint_id, h]));

      list.innerHTML = [...session.checkpoints].reverse().map(checkpoint => {
        const isHead     = checkpoint.is_current;
        const isSelected = checkpoint.checkpoint_id === viewState.selectedCpId;
        const hist       = byId.get(checkpoint.checkpoint_id);

        const delta = hist ? [
          hist.files_added_count    > 0 ? `<span class="sigil-a">+${hist.files_added_count}</span>` : '',
          hist.files_modified_count > 0 ? `<span class="sigil-m">~${hist.files_modified_count}</span>` : '',
          hist.files_removed_count  > 0 ? `<span class="sigil-r">-${hist.files_removed_count}</span>` : '',
        ].join('') : '';

        return `
          <div class="cp-row ${isHead ? 'is-head' : ''} ${isSelected ? 'selected' : ''}"
               onclick="onCheckpointClick(${checkpoint.checkpoint_id})">
            <span class="cp-row-num">#${checkpoint.checkpoint_id}</span>
            <span class="cp-row-label">${checkpoint.label ? escHtml(checkpoint.label) : ''}</span>
            <span class="cp-row-delta">${delta}</span>
          </div>`;
      }).join('');
    }

    // ── Rendering: live bar ───────────────────────────────────────────────────

    function renderLiveBar() {
      const bar = document.getElementById('live-bar');
      const live = viewState.liveOutput;
      if (!live?.running) { bar.classList.add('hidden'); return; }

      bar.classList.remove('hidden');
      document.getElementById('live-command').textContent = live.command ? `$ ${live.command}` : '';

      const pre = document.getElementById('live-output-pre');
      pre.textContent = live.output || '(No output yet)';
    }

    // ── Rendering: context bar ────────────────────────────────────────────────

    function renderContextBar() {
      const cpId      = viewState.selectedCpId;
      const sessionId = viewState.selectedSessionId;
      const bar       = document.getElementById('context-bar');
      if (cpId == null || !sessionId) { bar.innerHTML = ''; return; }

      const session = findSession(sessionId);
      const treeCp  = session?.checkpoints.find(c => c.checkpoint_id === cpId);
      const hist    = viewState.checkpointHistory.find(h => h.checkpoint_id === cpId);
      const labelSuffix = treeCp?.label ? ` · "${escHtml(treeCp.label)}"` : '';
      const rollbackHidden = treeCp?.is_current ? 'style="display:none"' : '';

      const forkButtons = (treeCp?.forks || []).map(f => `
        <button class="btn" onclick="onSessionClick('${escHtml(f.session_id)}')" title="${escHtml(f.session_id)}">Forked to ${escHtml(shortId(f.session_id))}</button>
      `).join('');

      bar.innerHTML = `
        <span class="mono-id">Checkpoint #${cpId}${labelSuffix}</span>
        ${hist?.command ? `<code class="context-command">${escHtml(hist.command)}</code>` : '<span class="context-command"></span>'}
        <div class="context-actions">
          ${hist?.command ? `<button class="btn" onclick="copyToClipboard('${escHtml(hist.command)}', this)">Copy command</button>` : ''}
          ${forkButtons}
          <button class="btn" onclick="onForkFromHereClick()">Fork from here</button>
          <button class="btn" id="rollback-here-btn" ${rollbackHidden} onclick="onRollbackHereClick()">Roll back to here</button>
        </div>`;
    }

    // ── Rendering: output column ──────────────────────────────────────────────

    function renderOutputColumn(cached) {
      const body = document.getElementById('output-body');
      if (!cached) { body.innerHTML = '<div class="loading-note">Loading…</div>'; return; }

      const stdoutHtml = cached.stdout
        ? `<pre class="output-pre">${escHtml(cached.stdout)}</pre>`
        : '<span class="output-empty">No output</span>';

      const stderrHtml = cached.stderr
        ? `<div class="output-label" style="color:var(--red)">Stderr</div><pre class="output-pre">${escHtml(cached.stderr)}</pre>`
        : '';

      body.innerHTML = `<div class="output-label">Stdout</div>${stdoutHtml}${stderrHtml}`;
    }

    // ── Rendering: files column ───────────────────────────────────────────────

    function buildFileTree(files) {
      const root = { name: '', children: new Map(), file: null };
      for (const file of files) {
        const parts = file.path.split('/');
        let node = root;
        for (const part of parts.slice(0, -1)) {
          if (!node.children.has(part)) node.children.set(part, { name: part, children: new Map(), file: null });
          node = node.children.get(part);
        }
        const leafName = parts[parts.length - 1];
        node.children.set(leafName, { name: leafName, children: new Map(), file });
      }
      return root;
    }

    function renderFileTreeChildren(children, deltaByPath) {
      const entries = [...children.values()].sort((a, b) => {
        const aIsDir = a.file === null, bIsDir = b.file === null;
        return aIsDir !== bIsDir ? (aIsDir ? -1 : 1) : a.name.localeCompare(b.name);
      });
      return entries.map(node => {
        if (node.file === null) {
          return `
            <details class="tree-dir" open>
              <summary class="tree-dir-label">${escHtml(node.name)}</summary>
              <div class="tree-dir-body">${renderFileTreeChildren(node.children, deltaByPath)}</div>
            </details>`;
        }
        const path      = node.file.path;
        const delta     = deltaByPath.get(path);
        const sigil     = delta === 'added'    ? '<span class="file-sigil sigil-a">+</span>'
                        : delta === 'modified' ? '<span class="file-sigil sigil-m">~</span>'
                        : '<span class="file-sigil"></span>';
        const isActive  = path === viewState.selectedFilePath;
        return `
          <div class="file-row tree-file ${isActive ? 'active' : ''}" onclick="onFileClick('${escHtml(path)}')" title="${escHtml(path)}">
            ${sigil}<span class="file-path">${escHtml(node.name)}</span><span class="file-size">${fmtBytes(node.file.size_bytes)}</span>
          </div>`;
      }).join('');
    }

    function renderFilesTree(cached, hist) {
      const tree = document.getElementById('files-tree');
      const counts = document.getElementById('files-counts');
      counts.textContent = hist ? `${hist.file_count} total` : '';

      if (!cached?.files) { tree.innerHTML = '<div class="loading-note">Loading…</div>'; return; }

      const deltaByPath = new Map();
      for (const f of cached.fileNames?.added    || []) deltaByPath.set(f, 'added');
      for (const f of cached.fileNames?.modified || []) deltaByPath.set(f, 'modified');
      const removed = cached.fileNames?.removed || [];

      if (cached.files.length === 0 && removed.length === 0) {
        tree.innerHTML = '<div class="empty-column-note">Workspace is empty</div>';
        return;
      }

      const built = buildFileTree(cached.files);
      const treeHtml = renderFileTreeChildren(built.children, deltaByPath);
      const removedHtml = removed.length
        ? `<div class="tree-removed">${removed.map(f => `
            <div class="file-row"><span class="file-sigil sigil-r">-</span><span class="file-path">${escHtml(f)}</span></div>`).join('')}</div>`
        : '';
      tree.innerHTML = treeHtml + removedHtml;
    }

    // Renders a diff block, or an empty-state message if there's nothing to
    // show yet (still loading) or nothing changed. Shared by the no-file-selected
    // default (whole checkpoint) and the per-file diff under a file's preview.
    function diffBlockHtml(diffText, emptyMessage) {
      if (diffText === undefined) return '<div class="loading-note">Loading…</div>';
      if (!diffText) return `<div class="file-preview-body"><span class="output-empty">${escHtml(emptyMessage)}</span></div>`;
      const lines = diffText.split('\n').map(line => {
        if      (line.startsWith('+++ ') || line.startsWith('--- ')) return `<span class="diff-line meta">${escHtml(line)}</span>`;
        else if (line.startsWith('+'))  return `<span class="diff-line added">${escHtml(line)}</span>`;
        else if (line.startsWith('-'))  return `<span class="diff-line removed">${escHtml(line)}</span>`;
        else if (line.startsWith('@@')) return `<span class="diff-line hunk">${escHtml(line)}</span>`;
        else                             return `<span class="diff-line context">${escHtml(line)}</span>`;
      });
      return `<div class="file-preview-body"><div class="diff-block">${lines.join('')}</div></div>`;
    }

    function renderFilesPreview(cached, fileState) {
      const preview = document.getElementById('files-preview');

      if (!viewState.selectedFilePath) {
        preview.innerHTML =
          `<div class="file-preview-head"><span class="mono-id">Diff from previous checkpoint</span></div>`
          + diffBlockHtml(cached?.diff, 'No changes from the previous checkpoint');
        return;
      }

      const head = `
        <div class="file-preview-head">
          <span class="mono-id">${escHtml(viewState.selectedFilePath)}</span>
          <button class="btn" onclick="copyToClipboard('${escHtml(viewState.selectedFilePath)}', this)">Copy path</button>
        </div>`;

      let contentHtml;
      if (fileState === undefined) {
        contentHtml = '<div class="loading-note">Loading…</div>';
      } else if (fileState.kind === 'image') {
        contentHtml = `<div class="file-preview-body"><img class="file-preview-image" src="${fileState.url}" alt="${escHtml(viewState.selectedFilePath)}"></div>`;
      } else if (fileState.kind === 'binary') {
        contentHtml = `<div class="file-preview-body"><span class="output-empty">Binary file — cannot preview</span></div>`;
      } else {
        contentHtml = `<div class="file-preview-body"><pre class="output-pre">${escHtml(fileState.content)}</pre></div>`;
      }

      const fileDiff = cached?.diff === undefined ? undefined : extractFileDiff(cached.diff, viewState.selectedFilePath);
      const diffHtml =
        `<div class="file-preview-diff-label">Diff from previous checkpoint</div>`
        + diffBlockHtml(fileDiff, 'No changes from the previous checkpoint');

      preview.innerHTML = head + contentHtml + diffHtml;
    }

    // ── Rendering: full workspace panel ───────────────────────────────────────

    function renderWorkspacePanel() {
      const cpId      = viewState.selectedCpId;
      const sessionId = viewState.selectedSessionId;
      const section   = document.getElementById('workspace-section');
      if (cpId == null || !sessionId) { section.classList.add('hidden'); return; }

      section.classList.remove('hidden');

      const cacheKey = `${sessionId}:${cpId}`;
      const cached   = viewState.outputCache.get(cacheKey);
      const hist     = viewState.checkpointHistory.find(h => h.checkpoint_id === cpId);

      renderContextBar();
      renderOutputColumn(cached);
      renderFilesTree(cached, hist);
      renderFilesPreview(cached, viewState.selectedFilePath
        ? viewState.fileCache.get(`${sessionId}:${cpId}:${viewState.selectedFilePath}`)
        : undefined);
    }

    // ── Event handlers ───────────────────────────────────────────────────────

    async function onSessionClick(sessionId) {
      if (viewState.selectedSessionId === sessionId) return;
      viewState.selectedSessionId = sessionId;
      viewState.selectedCpId      = null;
      viewState.selectedFilePath  = null;
      viewState.checkpointHistory = [];
      viewState.liveOutput        = null;

      renderSessionGrid();
      document.getElementById('workspace-section').classList.add('hidden');
      renderLiveBar();

      try {
        viewState.checkpointHistory = await Api.checkpointHistory(sessionId);
      } catch (e) {
        console.error('Failed to load history:', e);
      }

      // Select the current (head) checkpoint by default so the panel isn't empty.
      const session = findSession(sessionId);
      const headCpId = session ? currentCpIdForSession(session) : null;
      if (headCpId != null) {
        await onCheckpointClick(headCpId);
      }

      await refreshLiveOutput();
    }

    async function refreshLiveOutput() {
      const sessionId = viewState.selectedSessionId;
      if (!sessionId) { viewState.liveOutput = null; renderLiveBar(); return; }

      try {
        viewState.liveOutput = await Api.liveOutput(sessionId);
      } catch (e) {
        console.error('Failed to load live output:', e);
        viewState.liveOutput = null;
      }
      if (viewState.selectedSessionId === sessionId) renderLiveBar();
    }

    async function onCheckpointClick(cpId) {
      if (viewState.selectedCpId === cpId) return;
      viewState.selectedCpId     = cpId;
      viewState.selectedFilePath = null;

      renderCheckpointList();
      renderWorkspacePanel();

      const sessionId = viewState.selectedSessionId;
      const cacheKey  = `${sessionId}:${cpId}`;
      if (viewState.outputCache.has(cacheKey)) return;

      try {
        const [stdout, stderr, diff, files] = await Promise.all([
          Api.stdout(sessionId, cpId),
          Api.stderr(sessionId, cpId),
          cpId > 0 ? Api.diff(sessionId, cpId - 1, cpId) : Promise.resolve(''),
          Api.checkpointFiles(sessionId, cpId),
        ]);

        const fileNames = extractFileNamesFromDiff(diff);
        viewState.outputCache.set(cacheKey, { stdout, stderr, diff, fileNames, files });
      } catch (e) {
        console.error('Failed to load checkpoint output:', e);
        viewState.outputCache.set(cacheKey, {
          stdout: '', stderr: '', diff: '',
          fileNames: { added: [], modified: [], removed: [] },
          files: [],
        });
      }

      if (viewState.selectedCpId === cpId) renderWorkspacePanel();
    }

    async function onFileClick(path) {
      // Clicking the already-selected file deselects it, returning to the
      // whole-checkpoint diff — the only way back once a file is chosen.
      viewState.selectedFilePath = viewState.selectedFilePath === path ? null : path;
      renderWorkspacePanel();
      if (viewState.selectedFilePath === null) return;

      const sessionId = viewState.selectedSessionId;
      const cpId      = viewState.selectedCpId;
      const cacheKey  = `${sessionId}:${cpId}:${path}`;
      if (!viewState.fileCache.has(cacheKey)) {
        try {
          viewState.fileCache.set(cacheKey, await Api.fileContent(sessionId, cpId, path));
        } catch (e) {
          console.error('Failed to load file content:', e);
          viewState.fileCache.set(cacheKey, { kind: 'binary' });
        }
      }
      if (viewState.selectedFilePath === path) renderWorkspacePanel();
    }

    async function onDestroySessionClick(sessionId) {
      if (!confirm(`Destroy session ${sessionId}?\n\nThis permanently discards its workspace and checkpoint history — it cannot be undone.`)) {
        return;
      }
      try {
        await Api.deleteSession(sessionId);
      } catch (e) {
        console.error('Failed to destroy session:', e);
        alert(`Failed to destroy session: ${e.message}`);
        return;
      }
      if (viewState.selectedSessionId === sessionId) {
        viewState.selectedSessionId = null;
        viewState.selectedCpId      = null;
        viewState.selectedFilePath  = null;
        viewState.liveOutput        = null;
        document.getElementById('workspace-section').classList.add('hidden');
        renderLiveBar();
      }
      await refresh();
    }

    async function onEditLabelClick(sessionId) {
      const next = prompt('Label for this session (empty to clear):', findSession(sessionId)?.label || '');
      if (next === null) return;
      try {
        await Api.setLabel(sessionId, next);
      } catch (e) {
        console.error('Failed to set label:', e);
        alert(`Failed to set label: ${e.message}`);
        return;
      }
      await refresh();
    }

    async function onSnapshotClick(sessionId, btn) {
      try {
        await Api.snapshot(sessionId);
      } catch (e) {
        console.error('Failed to snapshot session:', e);
        alert(`Failed to snapshot: ${e.message}`);
        return;
      }
      flashButton(btn);
    }

    async function onForkFromHereClick() {
      const sessionId = viewState.selectedSessionId;
      const cpId      = viewState.selectedCpId;
      if (sessionId == null || cpId == null) return;
      let forked;
      try {
        forked = await Api.fork(sessionId, cpId);
      } catch (e) {
        console.error('Failed to fork session:', e);
        alert(`Failed to fork: ${e.message}`);
        return;
      }
      await refresh();
      await onSessionClick(forked.session_id);
    }

    async function onRollbackHereClick() {
      const sessionId = viewState.selectedSessionId;
      const cpId      = viewState.selectedCpId;
      if (sessionId == null || cpId == null) return;
      if (!confirm(`Roll back session ${shortId(sessionId)} to checkpoint #${cpId}?\n\nEvery checkpoint after this point is permanently discarded on the next write — it cannot be undone.`)) {
        return;
      }
      try {
        await Api.rollback(sessionId, cpId);
      } catch (e) {
        console.error('Failed to roll back session:', e);
        alert(`Failed to roll back: ${e.message}`);
        return;
      }
      await refresh();
    }

    // ── Refresh loop ─────────────────────────────────────────────────────────

    async function refresh() {
      try {
        const [tree, status] = await Promise.all([
          Api.sessionsTree(),
          Api.status(),
        ]);
        viewState.sessionTree   = tree;
        viewState.flatSessions  = flattenTree(tree);
        viewState.daemonStatus  = status;

        document.getElementById('live-dot').classList.remove('offline');
        document.getElementById('status-label').textContent = `Updated ${new Date().toLocaleTimeString()}`;

        renderStatusStrip();
        renderDaemonPanel();
        renderSessionGrid();

        if (viewState.selectedSessionId && findSession(viewState.selectedSessionId)) {
          try {
            viewState.checkpointHistory = await Api.checkpointHistory(viewState.selectedSessionId);
          } catch (_) {}
          renderCheckpointList();
          if (viewState.selectedCpId != null) renderWorkspacePanel();
          await refreshLiveOutput();
        } else if (viewState.selectedSessionId) {
          // Selected session no longer exists (destroyed or reaped) — clear the stale detail view.
          viewState.selectedSessionId = null;
          viewState.selectedCpId      = null;
          viewState.selectedFilePath  = null;
          viewState.liveOutput        = null;
          document.getElementById('workspace-section').classList.add('hidden');
          renderLiveBar();
        }
      } catch (e) {
        document.getElementById('live-dot').classList.add('offline');
        document.getElementById('status-label').textContent = 'Disconnected';
      }
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
